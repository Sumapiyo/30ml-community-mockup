<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>イベントチェックイン｜30 MINUTES SISTERS ZONE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        theme: {
          spacing: {
            0:'0px',1:'1px',2:'2px',4:'4px',6:'6px',8:'8px',
            10:'10px',12:'12px',14:'14px',16:'16px',18:'18px',
            20:'20px',24:'24px',28:'28px',32:'32px',36:'36px',
            40:'40px',44:'44px',48:'48px',52:'52px',56:'56px',
            60:'60px',64:'64px',72:'72px',80:'80px',88:'88px',
            96:'96px',112:'112px',128:'128px',px:'1px','0.5':'2px',
          },
          borderRadius: { none:'0px',xs:'2px',DEFAULT:'4px',sm:'4px',md:'8px',lg:'16px',full:'9999px' },
          extend: {
            fontFamily: { sans: ['Open Sans','Noto Sans JP','system-ui','sans-serif'] },
            colors: {
              ink: { 900:'#1A1A1A',700:'#474747',600:'#5C5C5C',500:'#737373',400:'#949494',300:'#B3B3B3',200:'#D1D1D1',100:'#E8E8E8',50:'#F5F5F5',25:'#FAFAFA' },
              brand: { 25:'#FCF7FF',50:'#F9EDFF',100:'#F0D7FC',300:'#D79DF5',500:'#A93DE0',600:'#8C21C2',700:'#6E05A3' },
              gold:'#C6A35A', like:'#E5097B',
            },
            boxShadow: {
              card:'0px 0px 4px rgba(0,0,0,0.08), 0px 0px 8px rgba(0,0,0,0.06)',
              cardLg:'0px 0px 8px rgba(0,0,0,0.08), 0px 0px 16px rgba(0,0,0,0.06)',
            },
          },
        },
      };
    </script>
    <style>
      body { font-family:'Open Sans','Noto Sans JP',system-ui,sans-serif; background:#fafafa; color:#1a1a1a; }
      .scrollbar-hide::-webkit-scrollbar { display:none; }
      .scrollbar-hide { scrollbar-width:none; }
    </style>
  </head>
  <body class="min-h-screen">

    <!-- ===================== Back Header ===================== -->
    <header class="fixed inset-x-0 top-0 z-20 flex h-48 items-center border-b border-ink-50 bg-white px-8">
      <a href="javascript:history.back()" class="grid h-36 w-36 place-items-center rounded-full hover:bg-ink-25">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="m15 18-6-6 6-6" stroke="#1A1A1A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
      <span class="mx-auto text-[14px] font-bold">イベントチェックイン</span>
      <div class="h-36 w-36"></div>
    </header>

    <!-- ===================== Main ===================== -->
    <div class="pt-48">
      <div class="mx-auto max-w-lg px-16 py-20">
        <main class="min-w-0">
          <div class="mb-16">
            <p class="text-[13px] text-ink-500">開催中のイベントでチェックインして、購入権を受け取ろう</p>
          </div>

          <!-- Event list -->
          <div class="flex flex-col gap-12" id="event-list"></div>
        </main>
      </div>
    </div>

    <script>
      // ── Event data ──
      const EVENTS = [
        {
          id: 'tokyo2026',
          name: '30ML Fes 2026 in TOKYO',
          venue: '東京ビッグサイト 東6ホール',
          date: '2026/06/23(火) 10:00 – 18:00',
          target: 'フェス限定 30MS イクシアール（1人1点）',
          deadline: '18:00',
          serial: '#00123',
          status: 'live',
        },
        {
          id: 'osaka2026',
          name: '30ML Summer 2026 in OSAKA',
          venue: 'インテックス大阪 6号館',
          date: '2026/07/20(日) 10:00 – 17:00',
          target: 'フェス限定 30MF シルヴィア（1人1点）',
          deadline: '17:00',
          serial: '#00456',
          status: 'upcoming',
        },
        {
          id: 'nagoya2026',
          name: '30ML × 電撃 合同フェス in NAGOYA',
          venue: 'ポートメッセなごや 第1展示館',
          date: '2026/09/14(日) 10:00 – 17:00',
          target: 'フェス限定 30MM ラビオット（1人1点）',
          deadline: '17:00',
          serial: '#00789',
          status: 'upcoming',
        },
        {
          id: 'winter2025',
          name: '30ML Winter Fes 2025',
          venue: '幕張メッセ 8ホール',
          date: '2025/12/14(日) 10:00 – 17:00',
          target: 'フェス限定 30MS アルシャ（1人1点）',
          deadline: '17:00',
          serial: '#00001',
          status: 'ended',
        },
      ];

      const STATUS_MAP = {
        live:     { label: '開催中',   cls: 'bg-emerald-100 text-emerald-700' },
        upcoming: { label: '開催予定', cls: 'bg-brand-50 text-brand-700' },
        ended:    { label: '終了',     cls: 'bg-ink-50 text-ink-400' },
      };

      function renderEvents() {
        const list = document.getElementById('event-list');
        list.innerHTML = EVENTS.map(ev => {
          const s = STATUS_MAP[ev.status];
          const isClickable = ev.status !== 'ended';
          const tag = isClickable ? 'a' : 'div';
          const href = isClickable ? `href="checkin.html?event=${ev.id}"` : '';
          return `
            <${tag} ${href} class="flex items-center gap-16 rounded-lg bg-white p-16 shadow-card ${isClickable ? 'cursor-pointer hover:shadow-cardLg transition-shadow' : 'opacity-60'}">
              <div class="flex-1 min-w-0">
                <div class="mb-6 flex items-center gap-8">
                  <span class="inline-flex items-center rounded-full px-8 py-2 text-[11px] font-bold ${s.cls}">${s.label}</span>
                </div>
                <div class="text-[15px] font-bold leading-snug truncate">${ev.name}</div>
                <div class="mt-4 flex flex-col gap-2">
                  <div class="flex items-center gap-6 text-[12px] text-ink-500">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M12 2C8.1 2 5 5.1 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.9-3.1-7-7-7Z" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="9" r="2.5" stroke="currentColor" stroke-width="1.6"/></svg>
                    ${ev.venue}
                  </div>
                  <div class="flex items-center gap-6 text-[12px] text-ink-500">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
                    ${ev.date}
                  </div>
                </div>
              </div>
              ${isClickable ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="shrink-0 text-ink-300"><path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>` : ''}
            </${tag}>
          `;
        }).join('');
      }
      renderEvents();

      // Tenant switcher
      document.querySelectorAll('[data-tenant-switcher]').forEach((root) => {
        const btn = root.querySelector('[data-tenant-button]');
        const menu = root.querySelector('[data-tenant-menu]');
        btn?.addEventListener('click', (e) => { e.stopPropagation(); menu?.classList.toggle('hidden'); });
      });
      document.addEventListener('click', (e) => {
        document.querySelectorAll('[data-tenant-switcher]').forEach((root) => {
          if (!root.contains(e.target)) root.querySelector('[data-tenant-menu]')?.classList.add('hidden');
        });
      });
    </script>

    <script src="sidemenu.js"></script>
  </body>
</html>
