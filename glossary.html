    <script>
      (function () {
        var KEY = 'db_gate_ok'; var PASS = 'gaudiy00';
        var gate = document.getElementById('gate');
        function unlock() { gate.style.display = 'none'; document.body.style.overflow = ''; }
        if (sessionStorage.getItem(KEY) === '1') { unlock(); } else { document.body.style.overflow = 'hidden'; }

          e.preventDefault();
          if (document.getElementById('gate-input').value.trim() === PASS) { sessionStorage.setItem(KEY, '1'); unlock(); }

    <script>
      const yen = (n) => '¥' + n.toLocaleString('ja-JP');
      const esc = (s) => (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      function brandBadge(b) {
        const cls = b === '30MF' ? 'bg-gold' : b === '30MS' ? 'bg-brand-500' : 'bg-ink-700';
        return '<span class="rounded px-6 py-2 text-[10px] font-bold text-white ' + cls + '">' + b + '</span>';
      }
      function catBadge(cat) {
        const cls = (cat === '勢力' || cat === '陣営') ? 'bg-brand-600' : (cat === '用語') ? 'bg-ink-600' : 'bg-brand-500';
        return '<span class="rounded px-6 py-2 text-[10px] font-bold text-white ' + cls + '">' + cat + '</span>';
      }

      function termCard(t) {
        return (
          '<a href="glossary.html?id=' + encodeURIComponent(t.id) + '" class="group block w-[150px] shrink-0 snap-start overflow-hidden rounded-lg bg-white shadow-card ring-1 ring-ink-50 transition hover:shadow-cardLg lg:w-[180px]">' +
            '<div class="placeholder ' + (t.tone === 'dark' ? 'ph-dark' : '') + ' relative aspect-[4/3]">' +
              '<div class="absolute left-8 top-8">' + catBadge(t.cat) + '</div>' +
              '<div class="absolute right-8 top-8">' + brandBadge(t.brand) + '</div>' +
            '</div>' +
            '<div class="p-10"><div class="text-[13px] font-bold">' + esc(t.name) + '</div>' +
            '<div class="mt-2 line-clamp-2 text-[11px] leading-snug text-ink-500">' + esc(t.desc) + '</div></div>' +
          '</a>'
        );
      }

      function productCard(it) {
        const img = it.img
          ? '<img src="db-images/' + it.img + '" alt="" class="aspect-square w-full bg-white object-contain" loading="lazy" />'
          : '<div class="placeholder ph-dark aspect-square"></div>';
        return (
          '<a href="detail.html?code=' + encodeURIComponent(it.c) + '" class="group block overflow-hidden rounded-lg bg-white shadow-card transition hover:shadow-cardLg">' +
            '<div class="relative"><div class="absolute left-8 top-8 z-10">' + brandBadge(it.b) + '</div>' + img + '</div>' +
            '<div class="p-10"><div class="line-clamp-2 min-h-[34px] text-[12px] font-bold leading-tight">' + esc(it.n) + '</div>' +
            '<div class="mt-6 flex items-center justify-between"><span class="text-[13px] font-bold">' + yen(it.p) + '</span><span class="text-[10px] text-ink-400">' + esc(it.d) + '</span></div></div>' +
          '</a>'
        );
      }

      // 用語カード(termCard)と同じ大きさ・タイトル/ユーザー名つき
      const SAMPLE_WORKS = [
        { title: '闇翼の槍使い', user: 'nagi', tone: 'dark' },
        { title: 'ブルーライダー型カスタム', user: 'aoi', tone: 'light' },
        { title: 'ネオン・スナイパー', user: 'kuro', tone: 'dark' },
      ];
      function workCard(w) {
        return (
          '<a href="work.html" class="group block w-[150px] shrink-0 snap-start overflow-hidden rounded-lg bg-white shadow-card ring-1 ring-ink-50 transition hover:shadow-cardLg lg:w-[180px]">' +
            '<div class="placeholder ' + (w.tone === 'dark' ? 'ph-dark' : '') + ' aspect-[4/3]"></div>' +
            '<div class="p-10">' +
              '<div class="line-clamp-1 text-[12px] font-bold">' + esc(w.title) + '</div>' +
              '<div class="mt-4 flex items-center gap-4 text-[11px] text-ink-500"><span class="h-14 w-14 rounded-full bg-gradient-to-br from-brand-300 to-brand-100"></span>' + esc(w.user) + '</div>' +
            '</div>' +
          '</a>'
        );
      }

      function sectionWrap(title, sub, inner, badge) {
        return (
          '<section class="mt-16 overflow-hidden rounded-lg bg-white shadow-card">' +
            '<header class="flex items-center justify-between border-b border-ink-50 px-16 py-12 lg:px-20">' +
              '<div><div class="text-[15px] font-bold">' + title + '</div>' +
              (sub ? '<div class="mt-2 text-[11px] text-ink-500">' + sub + '</div>' : '') + '</div>' +
              (badge ? '<span class="rounded-full bg-brand-50 px-10 py-4 text-[11px] font-semibold text-brand-700">' + badge + '</span>' : '') +
            '</header>' +
            '<div class="p-16 lg:p-20">' + inner + '</div>' +
          '</section>'
        );
      }

      function render() {
        const root = document.getElementById('term-root');
        const id = new URLSearchParams(location.search).get('id');
        const g = (window.GLOSSARY || []).find((t) => t.id === id);

        if (!g) {
          root.innerHTML =
            '<div class="rounded-lg bg-white p-32 text-center shadow-card">' +
              '<div class="text-[15px] font-bold">用語が見つかりませんでした</div>' +
              '<p class="mt-6 text-[13px] text-ink-500">URLが正しくない可能性があります。</p>' +
              '<a href="database.html" class="mt-16 inline-flex h-40 items-center rounded-full bg-brand-600 px-20 text-[13px] font-bold text-white hover:bg-brand-700">用語集へ戻る</a>' +
            '</div>';
          return;
        }

        document.title = g.name + '｜用語集｜30ML COMMUNITY';

        // 関連する用語：同ブランド、同勢力/同カテゴリを優先
        const relTerms = window.GLOSSARY
          .filter((t) => t.id !== g.id && t.brand === g.brand)
          .map((t) => ({ t, score: (t.faction && t.faction === g.faction ? 2 : 0) + (t.cat === g.cat ? 1 : 0) }))
          .sort((a, b) => b.score - a.score)
          .slice(0, 6)
          .map((x) => x.t);

        // 関連する商品：同ブランド（名称一致＞勢力一致＞ブランド一致の順で優先）
        const sameBrand = (window.ITEMS || []).filter((x) => x.b === g.brand);
        const byName = sameBrand.filter((x) => x.n.includes(g.name));
        const byFaction = g.faction ? sameBrand.filter((x) => x.faction === g.faction) : [];
        const ranked = [];
        const seen = new Set();
        [byName, byFaction, sameBrand].forEach((list) => {
          list.sort((a, b) => b.sk - a.sk).forEach((x) => { if (!seen.has(x.c)) { seen.add(x.c); ranked.push(x); } });
        });
        const relProducts = ranked.slice(0, 8);

        const metaRows = [
          ['ブランド', BRAND_FULL(g.brand)],
          ['カテゴリ', esc(g.cat)],
        ];
        if (g.faction) metaRows.push(['勢力', esc(g.faction)]);

        root.innerHTML =
          // Breadcrumb
          '<div class="mb-12 flex min-w-0 items-center gap-8 whitespace-nowrap pt-12 text-[13px] text-ink-500">' +
            '<a href="database.html" class="shrink-0 hover:underline">データベース</a>' +
            '<svg width="12" height="12" viewBox="0 0 24 24" class="shrink-0"><path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" /></svg>' +
            '<a href="database.html" class="shrink-0 hover:underline">用語集</a>' +
            '<svg width="12" height="12" viewBox="0 0 24 24" class="shrink-0"><path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" /></svg>' +
            '<span class="min-w-0 flex-1 truncate text-ink-700">' + esc(g.name) + '</span>' +
          '</div>' +

          // Hero
          '<article class="overflow-hidden bg-white shadow-card lg:rounded-lg">' +
            '<div class="placeholder ' + (g.tone === 'dark' ? 'ph-dark' : '') + ' relative aspect-[16/9] lg:aspect-[21/9]">' +
              '<div class="absolute left-12 top-12 flex gap-6">' + catBadge(g.cat) + brandBadge(g.brand) + '</div>' +
            '</div>' +
            '<div class="p-16 lg:p-24">' +
              '<h1 class="text-[22px] font-bold leading-snug lg:text-[28px]">' + esc(g.name) + '</h1>' +
              '<dl class="mt-14 grid grid-cols-[80px_1fr] gap-y-8 text-[13px]">' +
                metaRows.map(([k, v]) => '<dt class="text-ink-500">' + k + '</dt><dd>' + v + '</dd>').join('') +
              '</dl>' +
              '<p class="mt-16 text-[14px] leading-relaxed text-ink-700">' + esc(g.desc) + '</p>' +
            '</div>' +
          '</article>' +

          // 関連する用語
          (relTerms.length
            ? sectionWrap('関連する用語', '同じシリーズの設定（横にスクロール）', '<div class="flex snap-x snap-mandatory gap-12 overflow-x-auto scrollbar-hide pb-4">' + relTerms.map(termCard).join('') + '</div>')
            : '') +

          // 関連する作例
          sectionWrap('関連する作例', 'この設定にまつわるコミュニティ投稿（横にスクロール）', '<div class="flex snap-x snap-mandatory gap-12 overflow-x-auto scrollbar-hide pb-4">' + SAMPLE_WORKS.map(workCard).join('') + '</div>', '準備中') +

          // 関連する商品
          (relProducts.length
            ? sectionWrap('関連する商品', '同じ ' + g.brand + ' のアイテム', '<div class="grid grid-cols-2 gap-12 lg:grid-cols-3 xl:grid-cols-4">' + relProducts.map(productCard).join('') + '</div>')
            : '') +

          '<div class="h-32"></div>';
      }

      function BRAND_FULL(b) {
        return ({ '30MM': '30 MINUTES MISSIONS', '30MS': '30 MINUTES SISTERS', '30MF': '30 MINUTES FANTASY' }[b] || b) + ' (' + b + ')';
      }

      render();
    </script>
  </body>
</html>
