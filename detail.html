    <script>
      (function () {
        var KEY = 'db_gate_ok'; var PASS = 'gaudiy00';
        var gate = document.getElementById('gate');
        function unlock() { gate.style.display = 'none'; document.body.style.overflow = ''; }
        if (sessionStorage.getItem(KEY) === '1') { unlock(); } else { document.body.style.overflow = 'hidden'; }
        document.getElementById('gate-form').addEventListener('submit', function (e) {
          e.preventDefault();
          if (document.getElementById('gate-input').value.trim() === PASS) { sessionStorage.setItem(KEY, '1'); unlock(); }
          else { document.getElementById('gate-error').classList.remove('hidden'); }
        });
      })();

    <script>
      const BRAND_FULL = { '30MM': '30 MINUTES MISSIONS', '30MS': '30 MINUTES SISTERS', '30MF': '30 MINUTES FANTASY' };
      const KIND_LABEL = { base: 'ベースキット', option: 'オプションパーツ' };
      const SUBKIND_LABEL = { base: 'ベースキット', option: 'オプションパーツ', weapon: 'カスタマイズウェポンズ', decal: 'デカール' };
      const yen = (n) => '¥' + n.toLocaleString('ja-JP');

      function brandBadge(b) {
        const cls = b === '30MF' ? 'bg-gold' : b === '30MS' ? 'bg-brand-500' : 'bg-ink-700';
        return '<span class="rounded px-6 py-2 text-[10px] font-bold text-white ' + cls + '">' + b + '</span>';
      }
      function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

      function heroImg(it, big) {
        if (it.img) return '<img src="db-images/' + it.img + '" alt="" class="aspect-square w-full rounded-md bg-white object-contain" />';
        return '<div class="placeholder ph-dark aspect-square ' + (big ? 'rounded-md' : 'rounded-sm') + '"></div>';
      }

      // 作例カード（用語詳細と同じ大きさ・タイトル/ユーザー名つき）
      const SAMPLE_WORKS = [
        { title: '闇翼の槍使い', user: 'nagi', tone: 'dark' },
        { title: 'ブルーライダー型カスタム', user: 'aoi', tone: 'light' },
        { title: 'ネオン・スナイパー', user: 'kuro', tone: 'dark' },
      ];
      function workCard(w) {
        return (
          '<a href="work.html" class="group block w-[150px] shrink-0 snap-start overflow-hidden rounded-lg bg-white shadow-card ring-1 ring-ink-50 transition hover:shadow-cardLg lg:w-[180px]">' +
            '<div class="placeholder ' + (w.tone === 'dark' ? 'ph-dark' : '') + ' aspect-[4/3]"></div>' +
            '<div class="p-10">' +
              '<div class="line-clamp-1 text-[12px] font-bold">' + esc(w.title) + '</div>' +
              '<div class="mt-4 flex items-center gap-4 text-[11px] text-ink-500"><span class="h-14 w-14 rounded-full bg-gradient-to-br from-brand-300 to-brand-100"></span>' + esc(w.user) + '</div>' +
            '</div>' +
          '</a>'
        );
      }

      // よく使われるワード（作例投稿から集計したモック）。出現頻度で大きさ・濃さを変える
      const FREQ_WORDS = [
        { w: '越境ビルド', c: 42 }, { w: '全塗装', c: 36 }, { w: 'かっこいい', c: 31 }, { w: '騎士', c: 27 },
        { w: 'メタリック', c: 24 }, { w: '改造', c: 21 }, { w: 'リーベル', c: 19 }, { w: '翼', c: 18 },
        { w: '紫', c: 16 }, { w: '武装強化', c: 14 }, { w: 'ドラゴニア', c: 12 }, { w: '部分塗装', c: 11 },
        { w: 'ナイト', c: 9 }, { w: '夜', c: 8 }, { w: 'ガンメタル', c: 7 }, { w: '素組み', c: 6 },
        { w: 'スミ入れ', c: 5 }, { w: 'ジオラマ', c: 4 },
      ];
      function wordCloud() {
        const max = 42, min = 4;
        // ワードクラウド風：色とサイズがバラついた文字を密に配置（大小を混ぜるため出現順を撹拌）
        const palette = ['text-brand-700', 'text-brand-500', 'text-brand-300', 'text-gold', 'text-ink-700', 'text-ink-500', 'text-ink-400', 'text-like'];
        const order = FREQ_WORDS
          .map((x) => ({ x, k: (x.w.length * 7 + x.c * 3) % 11 }))
          .sort((a, b) => a.k - b.k)
          .map((o) => o.x);
        const words = order.map((x) => {
          const size = Math.round(13 + ((x.c - min) / (max - min)) * 19); // 13〜32px
          const color = palette[(x.w.length + x.c) % palette.length];
          const weight = x.c >= 20 ? 'font-bold' : x.c >= 10 ? 'font-semibold' : 'font-medium';
          return '<span class="' + color + ' ' + weight + '" style="font-size:' + size + 'px;line-height:1.05">' + esc(x.w) + '</span>';
        }).join('');
        return (
          '<section class="mt-16 overflow-hidden rounded-lg bg-white shadow-card">' +
            '<header class="flex items-center justify-between border-b border-ink-50 px-16 py-12 lg:px-20">' +
              '<div><div class="text-[15px] font-bold">よく使われるワード</div>' +
              '<div class="mt-2 text-[11px] text-ink-500">この作例の投稿でよく登場するワード</div></div>' +
              '<span class="rounded-full bg-brand-50 px-10 py-4 text-[11px] font-semibold text-brand-700">準備中</span>' +
            '</header>' +
            '<div class="flex flex-wrap items-center justify-center gap-x-12 gap-y-4 p-20 lg:p-24">' + words + '</div>' +
          '</section>'
        );
      }

      // ＜＞で切り替えるギャラリー（複数画像のモック。実画像があれば1枚目に表示）
      function gallery(it) {
        const slides = [];
        if (it.img) slides.push('<img src="db-images/' + it.img + '" alt="" class="h-full w-full bg-white object-contain" />');
        while (slides.length < 4) slides.push('<div class="placeholder ph-dark h-full w-full"></div>');
        const arrow = (dir) => '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="' + (dir === 'prev' ? 'm15 6-6 6 6 6' : 'm9 6 6 6-6 6') + '" stroke="#1A1A1A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        return (
          '<div data-gallery class="relative aspect-square overflow-hidden rounded-md bg-ink-25 ring-1 ring-ink-100">' +
            slides.map((s, i) => '<div class="gslide absolute inset-0' + (i ? ' hidden' : '') + '">' + s + '</div>').join('') +
            '<button data-prev aria-label="前の画像" class="absolute left-8 top-1/2 grid h-32 w-32 -translate-y-1/2 place-items-center rounded-full bg-white/85 text-ink-900 shadow-card hover:bg-white">' + arrow('prev') + '</button>' +
            '<button data-next aria-label="次の画像" class="absolute right-8 top-1/2 grid h-32 w-32 -translate-y-1/2 place-items-center rounded-full bg-white/85 text-ink-900 shadow-card hover:bg-white">' + arrow('next') + '</button>' +
            '<div data-counter class="absolute bottom-8 right-8 rounded-full bg-ink-900/70 px-8 py-2 text-[11px] font-semibold text-white backdrop-blur">1 / ' + slides.length + '</div>' +
          '</div>'
        );
      }

      function specRows(it) {
        const rows = [
          ['ブランド', BRAND_FULL[it.b] + ' (' + it.b + ')'],
          ['品番', '<span class="font-mono text-[12px]">' + esc(it.c) + '</span>'],
          ['種類', SUBKIND_LABEL[it.s] || KIND_LABEL[it.k] || it.k],
        ];
        if (it.b === '30MF' && it.mfcat) rows.push(['30MFカテゴリ', esc(it.mfcat)]);
        if (it.faction) rows.push(['勢力', esc(it.faction)]);
        rows.push(['発売', esc(it.d)]);
        rows.push(['メーカー', 'BANDAI SPIRITS']);
        return rows.map(([k, v]) => '<dt class="text-ink-500">' + k + '</dt><dd>' + v + '</dd>').join('');
      }

      function relatedCard(it) {
        const img = it.img
          ? '<img src="db-images/' + it.img + '" alt="" class="aspect-square w-full bg-white object-contain" loading="lazy" />'
          : '<div class="placeholder ph-dark aspect-square"></div>';
        return (
          '<a href="detail.html?code=' + encodeURIComponent(it.c) + '" class="group block overflow-hidden rounded-lg bg-white shadow-card transition hover:shadow-cardLg">' +
            '<div class="relative"><div class="absolute left-8 top-8 z-10">' + brandBadge(it.b) + '</div>' + img + '</div>' +
            '<div class="p-10">' +
              '<div class="line-clamp-2 min-h-[34px] text-[12px] font-bold leading-tight">' + esc(it.n) + '</div>' +
              '<div class="mt-6 flex items-center justify-between"><span class="text-[13px] font-bold">' + yen(it.p) + '</span><span class="text-[10px] text-ink-400">' + esc(it.d) + '</span></div>' +
            '</div>' +
          '</a>'
        );
      }

      function render() {
        const root = document.getElementById('detail-root');
        const code = new URLSearchParams(location.search).get('code');
        const it = (window.ITEMS || []).find((x) => x.c === code);

        if (!it) {
          root.innerHTML =
            '<div class="rounded-lg bg-white p-32 text-center shadow-card">' +
              '<div class="text-[15px] font-bold">アイテムが見つかりませんでした</div>' +
              '<p class="mt-6 text-[13px] text-ink-500">URLが正しくない可能性があります。</p>' +
              '<a href="database.html" class="mt-16 inline-flex h-40 items-center rounded-full bg-brand-600 px-20 text-[13px] font-bold text-white hover:bg-brand-700">データベースへ戻る</a>' +
            '</div>';
          return;
        }

        document.title = it.n + '｜30ML COMMUNITY';

        // 関連アイテム（同ブランド・同種別、自身を除く）
        const related = window.ITEMS
          .filter((x) => x.c !== it.c && x.b === it.b && x.k === it.k)
          .sort((a, b) => b.sk - a.sk)
          .slice(0, 8);

        root.innerHTML =
          // Breadcrumb
          '<div class="mb-12 flex min-w-0 items-center gap-8 whitespace-nowrap pt-12 text-[13px] text-ink-500">' +
            '<a href="database.html" class="shrink-0 hover:underline">データベース</a>' +
            '<svg width="12" height="12" viewBox="0 0 24 24" class="shrink-0"><path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" /></svg>' +
            '<a href="database.html" class="shrink-0 hover:underline">アイテム</a>' +
            '<svg width="12" height="12" viewBox="0 0 24 24" class="shrink-0"><path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" /></svg>' +
            '<span class="min-w-0 flex-1 truncate text-ink-700">' + esc(it.n) + '</span>' +
          '</div>' +

          // Hero
          '<article class="overflow-hidden bg-white shadow-card lg:rounded-lg">' +
            '<div class="grid gap-20 p-16 lg:grid-cols-[300px_1fr] lg:p-24">' +
              '<div>' + gallery(it) + '</div>' +
              '<div class="min-w-0">' +
                '<div class="flex items-center gap-8">' + brandBadge(it.b) +
                  '<span class="text-[11px] font-bold tracking-widest text-brand-600">' + (KIND_LABEL[it.k] || '') + '</span>' +
                '</div>' +
                '<h1 class="mt-8 text-[20px] font-bold leading-snug lg:text-[24px]">' + esc(it.n) + '</h1>' +
                '<div class="mt-10 flex items-baseline gap-6"><span class="text-[22px] font-bold">' + yen(it.p) + '</span><span class="text-[12px] text-ink-500">(税込)</span></div>' +
                '<div class="mt-16 space-y-10">' +
                  '<button class="flex w-full items-center justify-center gap-8 rounded-full bg-brand-600 px-16 py-12 text-[14px] font-bold text-white hover:bg-brand-700">' +
                    '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 7h14l-1.5 10a2 2 0 0 1-2 1.7H8.5a2 2 0 0 1-2-1.7L5 7Z" stroke="white" stroke-width="1.6" /><circle cx="9" cy="20" r="1.4" fill="white" /><circle cx="16" cy="20" r="1.4" fill="white" /></svg>' +
                    '30ML ストアで購入する' +
                  '</button>' +
                  '<div class="grid grid-cols-2 gap-8">' +
                    '<button class="flex items-center justify-center gap-6 rounded-full bg-white px-12 py-10 text-[12px] font-bold text-ink-900 ring-1 ring-ink-100 hover:bg-ink-25">' +
                      '<svg width="14" height="14" viewBox="0 0 24 24"><path d="m5 12 5 5 9-11" stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" /></svg>持っている' +
                    '</button>' +
                    '<button class="flex items-center justify-center gap-6 rounded-full bg-white px-12 py-10 text-[12px] font-bold text-ink-900 ring-1 ring-ink-100 hover:bg-ink-25">' +
                      '<svg width="14" height="14" viewBox="0 0 24 24" fill="#FBC02D"><path d="M12 2 9 9l-7 1 5.5 4.5L6 22l6-4 6 4-1.5-7.5L22 10l-7-1-3-7Z" /></svg>欲しい' +
                    '</button>' +
                  '</div>' +
                '</div>' +
                '<div class="mt-20" data-spec>' +
                  '<div data-spec-body class="relative overflow-hidden" style="max-height:76px">' +
                    '<dl class="grid grid-cols-[100px_1fr] gap-y-8 text-[13px]">' + specRows(it) + '</dl>' +
                    '<div data-spec-fade class="pointer-events-none absolute inset-x-0 bottom-0 h-28 bg-gradient-to-t from-white to-transparent"></div>' +
                  '</div>' +
                  '<button data-spec-toggle class="mt-10 flex w-full items-center justify-center gap-4 text-[13px] font-bold text-brand-600 hover:text-brand-700">' +
                    '<span data-spec-label>詳細を見る</span>' +
                    '<svg data-spec-chev width="14" height="14" viewBox="0 0 24 24" fill="none" class="transition-transform"><path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
                  '</button>' +
                '</div>' +
              '</div>' +
            '</div>' +
          '</article>' +

          // この作品で使われた作例（プレースホルダー）
          '<section class="mt-16 overflow-hidden rounded-lg bg-white shadow-card">' +
            '<header class="flex items-center justify-between border-b border-ink-50 px-16 py-12 lg:px-20">' +
              '<div><div class="text-[15px] font-bold">このアイテムを使った作例</div>' +
              '<div class="mt-2 text-[11px] text-ink-500">コミュニティの投稿から集計</div></div>' +
              '<span class="rounded-full bg-brand-50 px-10 py-4 text-[11px] font-semibold text-brand-700">準備中</span>' +
            '</header>' +
            '<div class="p-16 lg:p-20">' +
              '<div class="flex snap-x snap-mandatory gap-12 overflow-x-auto scrollbar-hide">' +
                SAMPLE_WORKS.map(workCard).join('') +
              '</div>' +
            '</div>' +
          '</section>' +

          // このアイテムの二次創作（SS・イラスト）
          '<section class="mt-16 overflow-hidden rounded-lg bg-white shadow-card">' +
            '<header class="flex items-center justify-between border-b border-ink-50 px-16 py-12 lg:px-20">' +
              '<div><div class="text-[15px] font-bold">このアイテムの二次創作</div>' +
              '<div class="mt-2 text-[11px] text-ink-500">SS・イラストなどコミュニティの二次創作</div></div>' +
            '</header>' +
            '<div class="p-16 lg:p-20">' +
              '<div class="flex snap-x snap-mandatory gap-12 overflow-x-auto scrollbar-hide">' +
                (window.POSTS || []).filter((p) => p.type !== '作例').map(postCard).join('') +
              '</div>' +
            '</div>' +
          '</section>' +

          // よく使われるワード（ワードクラウド）
          wordCloud() +

          // 関連アイテム
          (related.length
            ? '<section class="mt-16">' +
                '<div class="mb-12 flex items-center justify-between">' +
                  '<h2 class="text-[16px] font-bold">関連アイテム</h2>' +
                  '<span class="text-[12px] text-ink-500">同じ ' + it.b + ' の' + (KIND_LABEL[it.k] || '') + '</span>' +
                '</div>' +
                '<div class="grid grid-cols-2 gap-12 lg:grid-cols-3 xl:grid-cols-4">' + related.map(relatedCard).join('') + '</div>' +
              '</section>'
            : '') +

          '<div class="h-32"></div>';

        // ギャラリーの＜＞切り替え
        const gal = document.querySelector('[data-gallery]');
        if (gal) {
          const slides = [...gal.querySelectorAll('.gslide')];
          const counter = gal.querySelector('[data-counter]');
          let idx = 0;
          const show = (i) => {
            idx = (i + slides.length) % slides.length;
            slides.forEach((s, j) => s.classList.toggle('hidden', j !== idx));
            counter.textContent = (idx + 1) + ' / ' + slides.length;
          };
          gal.querySelector('[data-prev]').addEventListener('click', () => show(idx - 1));
          gal.querySelector('[data-next]').addEventListener('click', () => show(idx + 1));
        }

        // スペックの「詳細を見る」展開
        const spec = document.querySelector('[data-spec]');
        if (spec) {
          const body = spec.querySelector('[data-spec-body]');
          const fade = spec.querySelector('[data-spec-fade]');
          const label = spec.querySelector('[data-spec-label]');
          const chev = spec.querySelector('[data-spec-chev]');
          let open = false;
          spec.querySelector('[data-spec-toggle]').addEventListener('click', () => {
            open = !open;
            body.style.maxHeight = open ? body.scrollHeight + 'px' : '76px';
            fade.classList.toggle('hidden', open);
            label.textContent = open ? '閉じる' : '詳細を見る';
            chev.style.transform = open ? 'rotate(180deg)' : '';
          });
        }
      }

      render();
    </script>
      <script src="sidemenu.js"></script>
  </body>
</html>
